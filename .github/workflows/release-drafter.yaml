name: Release Drafter

on:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  contents: read

jobs:
  update-release-draft:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
      - uses: release-drafter/release-drafter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Dedupe draft release notes
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { dedupeChangeEntries } = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/release-notes.cjs`);
            const [owner, repo] = process.env.GITHUB_REPOSITORY.split("/");

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            const targetRelease = releases
              .filter((release) => release.draft)
              .filter((release) => release.author?.login === "github-actions[bot]")
              .filter((release) => (release.body || "").includes("## Changes"))
              .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at))[0];

            if (!targetRelease) {
              core.notice("No managed draft release found for dedupe.");
              return;
            }

            const dedupedBody = `${dedupeChangeEntries(targetRelease.body || "")}\n`;

            if (dedupedBody === `${targetRelease.body || ""}`) {
              core.notice(`Draft release ${targetRelease.tag_name || targetRelease.name || targetRelease.id} already deduped.`);
              return;
            }

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: targetRelease.id,
              body: dedupedBody,
            });

            core.notice(`Deduped draft release ${targetRelease.tag_name || targetRelease.name || targetRelease.id}.`);

  autolabeler:
    if: ${{ github.event_name == 'pull_request_target' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: release-drafter/release-drafter/autolabeler@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
